openapi: 3.1.0
info:
  title: Task Service API
  description: OpenAPI specification for the simple Node.js task service.
  version: 1.0.0
servers:
  - url: https://localhost:3000
security:
  - basicAuth: []
paths:
  /task:
    get:
      summary: List all tasks
      description: Returns all tasks as persisted, including timestamps. Requires HTTP Basic authentication.
      responses:
        '200':
          description: A JSON array of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Access denied (HTTP Basic required)
          content:
            text/plain:
              schema:
                type: string
                example: Access denied
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - basicAuth: []
    post:
      summary: Create a new task
      description: Creates a task with the given title. Requires HTTP Basic authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
            examples:
              example:
                value:
                  title: "Buy milk"
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Access denied (HTTP Basic required)
          content:
            text/plain:
              schema:
                type: string
                example: Access denied
        '500':
          description: Error creating the task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - basicAuth: []
  /task/{task_id}:
    parameters:
      - name: task_id
        in: path
        required: true
        description: The UUID of the task
        schema:
          type: string
    get:
      summary: Get a task by id
      description: Returns a simplified public representation of a task where `done` is boolean. Requires HTTP Basic authentication.
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskPublic'
        '401':
          description: Access denied (HTTP Basic required)
          content:
            text/plain:
              schema:
                type: string
                example: Access denied
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - basicAuth: []
    put:
      summary: Update a task
      description: Updates the title and/or done flag of a task. Requires HTTP Basic authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
            examples:
              setDone:
                value:
                  done: true
              clearDone:
                value:
                  done: false
              rename:
                value:
                  title: "Buy coffee"
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Access denied (HTTP Basic required)
          content:
            text/plain:
              schema:
                type: string
                example: Access denied
        '500':
          description: Error updating the task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - basicAuth: []
    delete:
      summary: Delete a task
      description: Deletes a task by id. Requires HTTP Basic authentication.
      responses:
        '200':
          description: Task deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Access denied (HTTP Basic required)
          content:
            text/plain:
              schema:
                type: string
                example: Access denied
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - basicAuth: []
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Task:
      type: object
      properties:
        id:
          type: string
          description: Task identifier (UUID)
        title:
          type: string
        created:
          type: integer
          format: int64
          description: Creation timestamp in milliseconds since epoch
        modified:
          type: integer
          format: int64
          description: Last modification timestamp in milliseconds since epoch
        done:
          type: integer
          format: int64
          nullable: true
          description: When present, the timestamp (ms) when the task was marked done; absent when not done
      required:
        - id
        - title
        - created
        - modified
    TaskPublic:
      type: object
      properties:
        id:
          type: string
          description: Task identifier (UUID)
        title:
          type: string
        done:
          type: boolean
          description: True if the task is done; false otherwise
      required:
        - id
        - title
        - done
    TaskCreateRequest:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    TaskUpdateRequest:
      type: object
      properties:
        title:
          type: string
        done:
          type: boolean
      additionalProperties: false
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error Message
          example: "Task not found"
